<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CapyDream — VIP через донаты</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a, #1a1a3a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            color: #eee;
        }
        .container {
            max-width: 520px;
            width: 100%;
            background: rgba(20,20,40,0.95);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        h1 { text-align: center; color: #ffa500; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 20px; }
        .capy { text-align: center; font-size: 4rem; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; }
        input[type="text"] {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1px solid #333; background: #1a1a2e; color: #eee;
            font-size: 1rem; outline: none;
        }
        input:focus { border-color: #ffa500; }
        .btn {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; margin-bottom: 10px;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary {
            background: linear-gradient(135deg, #ff8c00, #ffa500);
            color: #1a1a2e;
        }
        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1a1a2e;
        }
        .result {
            background: #1a1a2e; border-radius: 12px; padding: 15px;
            min-height: 60px; margin-top: 15px;
        }
        .result h3 { color: #ffa500; margin-bottom: 5px; }
        .result p { color: #ccc; line-height: 1.6; }
        .vip-info {
            background: rgba(255,165,0,0.05); border: 1px solid rgba(255,165,0,0.2);
            border-radius: 12px; padding: 15px; margin-top: 15px;
        }
        .vip-info h3 { color: #ffa500; margin-bottom: 10px; }
        .vip-feature {
            display: flex; justify-content: space-between; padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .vip-feature:last-child { border-bottom: none; }
        .feature-yes { color: #4CAF50; }
        .feature-no { color: #666; }
        .donate-section {
            margin-top: 15px; border-top: 1px solid #333; padding-top: 15px;
        }
        .donate-section .sums {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
        }
        .donate-section .sums button {
            padding: 8px 16px; border-radius: 12px;
            border: 1px solid #333; background: #1a1a2e; color: #eee;
            cursor: pointer; font-weight: bold;
        }
        .donate-note {
            font-size: 0.8rem; color: #888; text-align: center; margin-top: 10px;
        }
        .hidden { display: none; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex;
            justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: #1a1a2e; border-radius: 16px; padding: 25px;
            text-align: center; border: 1px solid #ffa500;
        }
        .modal-emoji { font-size: 4rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦫 CapyDream</h1>
        <div class="subtitle">Сонник с VIP через донаты</div>
        <div class="capy" id="capyEmoji">🦫</div>

        <div class="input-group">
            <label>Что тебе снилось?</label>
            <input type="text" id="dreamInput" placeholder="например: апельсинка">
        </div>
        <button class="btn btn-primary" id="interpretBtn">✨ Толковать</button>

        <div class="result" id="resultBox">
            <h3>Толкование</h3>
            <p id="resultText">Напиши сон и нажми «Толковать».</p>
        </div>

        <div class="vip-info" id="vipInfo">
            <h3>👑 VIP-статус</h3>
            <div class="vip-feature"><span>История снов</span><span class="feature-no">❌</span></div>
            <div class="vip-feature"><span>Лунный календарь</span><span class="feature-no">❌</span></div>
            <div class="vip-feature"><span>Тёмная тема</span><span class="feature-no">❌</span></div>
            <div class="vip-feature"><span>Стикеры</span><span class="feature-no">❌</span></div>
            <button class="btn btn-gold" id="vipBtn">💎 Стать VIP (донат)</button>
        </div>

        <div class="donate-section">
            <h3>💛 Поддержать автора</h3>
            <div class="sums">
                <button data-amount="20">20 ₽</button>
                <button data-amount="50">50 ₽</button>
                <button data-amount="100">100 ₽</button>
                <button data-amount="500">500 ₽</button>
            </div>
            <div class="donate-note">
                После доната VIP активируется автоматически в течение 30 секунд.
            </div>
        </div>
    </div>

    <div class="modal hidden" id="thanksModal">
        <div class="modal-content">
            <div class="modal-emoji">🥹🦫</div>
            <h3 style="color:#ffd700;">Спасибо!</h3>
            <p style="color:#aaa;">VIP активирован навсегда</p>
            <button class="btn btn-gold" id="closeThanks">Понятно!</button>
        </div>
    </div>

    <script>
        // ===== ТОКЕН DONATIONALERTS =====
        const DA_TOKEN = 'ZaWfA7ewOTdYsEZVXURm';
        let isVip = localStorage.getItem('capydream_vip') === 'true';
        let processedDonations = JSON.parse(localStorage.getItem('da_processed') || '[]');

        // ===== VIP-ИНТЕРФЕЙС =====
        function updateVipUI() {
            const features = document.querySelectorAll('.vip-feature');
            if (isVip) {
                features.forEach(f => f.querySelector('.feature-no').textContent = '✅');
                document.getElementById('vipBtn').textContent = '👑 VIP активирован';
                document.getElementById('vipBtn').disabled = true;
                document.getElementById('capyEmoji').textContent = '👑🦫';
            } else {
                features.forEach(f => f.querySelector('.feature-no').textContent = '❌');
                document.getElementById('vipBtn').textContent = '💎 Стать VIP (донат)';
                document.getElementById('vipBtn').disabled = false;
                document.getElementById('capyEmoji').textContent = '🦫';
            }
        }

        // ===== ПРОВЕРКА ДОНАТОВ =====
        function checkDonations() {
            if (isVip) return;

            fetch('https://www.donationalerts.com/api/v1/alerts/donations', {
                headers: { 'Authorization': `Bearer ${DA_TOKEN}` }
            })
            .then(res => res.json())
            .then(data => {
                if (!data.data || data.data.length === 0) return;

                data.data.forEach(donation => {
                    if (processedDonations.includes(donation.id)) return;
                    processedDonations.push(donation.id);
                    localStorage.setItem('da_processed', JSON.stringify(processedDonations));

                    // Активируем VIP
                    isVip = true;
                    localStorage.setItem('capydream_vip', 'true');
                    updateVipUI();

                    // Показываем модалку благодарности
                    document.getElementById('thanksModal').classList.remove('hidden');
                });
            })
            .catch(err => console.error('Ошибка проверки донатов:', err));
        }

        // ===== ТОЛКОВАНИЕ СНОВ =====
        const dreams = {
            'апельсинка': 'К тебе придёт удача. Скоро ты получишь что-то приятное.',
            'вода': 'Ты чувствуешь спокойствие. Возможно, тебе нужен отдых.',
            'полёт': 'Ты стремишься к свободе. Попробуй что-то новое.',
            'капибара': 'Ты окружён заботой и теплом. Цени тех, кто рядом.',
            'крыса': 'Рядом есть кто-то, кто хочет тебя обмануть. Будь внимателен.',
            'дождь': 'Скоро наступят перемены. Не бойся их.',
            'лес': 'Ты ищешь уединение. Позволь себе побыть наедине с собой.',
            'огонь': 'Твоя энергия бьёт ключом. Используй её с умом.'
        };

        document.getElementById('interpretBtn').addEventListener('click', () => {
            const text = document.getElementById('dreamInput').value.trim();
            if (!text) {
                document.getElementById('resultText').textContent = 'Напиши, что тебе снилось.';
                return;
            }
            const interpretation = dreams[text.toLowerCase()] || 'Этот сон говорит о том, что ты думаешь о чём-то важном. Прислушайся к себе.';
            document.getElementById('resultText').textContent = interpretation;
        });

        // ===== ДОНАТ =====
        document.querySelectorAll('.sums button').forEach(btn => {
            btn.addEventListener('click', function() {
                const amount = this.dataset.amount;
                // Вместо реального доната — показываем модалку
                document.getElementById('thanksModal').classList.remove('hidden');
                isVip = true;
                localStorage.setItem('capydream_vip', 'true');
                updateVipUI();
            });
        });

        document.getElementById('vipBtn').addEventListener('click', () => {
            document.querySelector('.sums button[data-amount="20"]').click();
        });

        // ===== ЗАКРЫТИЕ МОДАЛКИ =====
        document.getElementById('closeThanks').addEventListener('click', () => {
            document.getElementById('thanksModal').classList.add('hidden');
        });

        // ===== СТАРТ =====
        updateVipUI();
        setInterval(checkDonations, 30000);
        checkDonations();
    </script>
</body>
</html>
